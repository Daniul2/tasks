# ===============================
#    (MySQL - Clever Cloud)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=20000
spring.datasource.hikari.initialization-fail-timeout=0

# ===============================
#   JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.jpa.defer-datasource-initialization=true

# ===============================
# ===============================
server.port=8087
spring.profiles.active=local
spring.main.web-application-type=servlet

currency.mode=api

# ===============================
#   Trello API
# ===============================
trello.api.endpoint=https://api.trello.com/1
trello.api.key=${TRELLO_API_KEY}
trello.api.token=${TRELLO_API_TOKEN}
trello.app.username=${TRELLO_USERNAME}

# ===============================
#   Email Configuration
# ===============================
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
#   Admin Configuration
# ===============================
admin.mail=medvedievdaniil300@gmail.com

# ===============================
#   Spring Actuator
# ===============================
management.endpoints.web.exposure.include=*
management.info.env.enabled=true

